<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Konciar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    img {
      width: 220px;
      margin-bottom: 24px;
    }

    /* 👇 기술 설명 문구 스타일 */
    .subtitle {
      font-size: 15px;
      color: #555;
      margin-bottom: 16px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.4;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 32px;
      font-weight: 500;
    }

    a.button {
      display: inline-block;
      padding: 14px 28px;
      background: #000000;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }

    a.button:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Konciar Logo" />

    <p class="subtitle">
      AI-powered concierge that helps visitors navigate Korea with ease.
    </p>

    <h1>Help us build a better Konciar</h1>

    <a
      class="button"
      href="https://docs.google.com/forms/d/e/1FAIpQLSe_NO1ln-tbOybI6Z9JEdnpPXDtWxVZRYI40b432W8JAnBHHg/viewform"
      target="_blank"
    >
      Take the survey
    </a>
  </div>
</body>
</html>
