<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Konciar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Konciar is an AI-powered concierge that helps visitors navigate Korea with ease." />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
    }

    .container {
      text-align: center;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    img {
      width: 220px;
      margin-bottom: 18px;
    }

    .lang-switch {
      margin-bottom: 16px;
      font-size: 14px;
    }

    .lang-switch button {
      background: none;
      border: none;
      cursor: pointer;
      margin: 0 10px;
      padding: 6px 2px;
      color: #666;
      font-size: 14px;
    }

    .lang-switch button.active {
      font-weight: 700;
      color: #000;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      margin: 0 auto 18px auto;
      max-width: 360px;
      line-height: 1.5;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 22px 0;
      font-weight: 750;
      letter-spacing: -0.2px;
    }

    .cta {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-top: 6px;
    }

    a.button {
      display: inline-block;
      padding: 16px 34px;
      background: #000000;
      color: #ffffff;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 650;
      min-width: 240px;
      box-sizing: border-box;
    }

    a.button:hover {
      opacity: 0.9;
    }

    a.button.secondary {
      background: #f2f2f2;
      color: #000;
      border: 1px solid #e5e5e5;
    }

    a.button.secondary:hover {
      opacity: 1;
      background: #eaeaea;
    }

    .fineprint {
      margin-top: 14px;
      font-size: 12px;
      color: #777;
      line-height: 1.5;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Konciar Logo" />

    <!-- Language -->
    <div class="lang-switch" role="group" aria-label="Language switch">
      <button class="active" onclick="setLang('en', this)" aria-pressed="true">EN</button>
      <button onclick="setLang('cn', this)" aria-pressed="false">中文</button>
    </div>

    <p id="subtitle" class="subtitle">
      AI-powered concierge that helps visitors navigate Korea with ease.
    </p>

    <h1 id="headline">Help us build a better Konciar</h1>

    <div class="cta">
      <a
        id="surveyLink"
        class="button"
        href="https://docs.google.com/forms/d/e/1FAIpQLSe_NO1ln-tbOybI6Z9JEdnpPXDtWxVZRYI40b432W8JAnBHHg/viewform"
        target="_blank"
        rel="noopener noreferrer"
      >
        Take the survey
      </a>

      <a
        id="bmLink"
        class="button secondary"
        href="/businessmodel.html"
      >
        Business
      </a>
    </div>

    <div id="fineprint" class="fineprint">
      Takes ~2 minutes. Your feedback helps us shape Konciar’s first release.
    </div>
  </div>

  <script>
    const content = {
      en: {
        subtitle: "AI-powered concierge that helps visitors navigate Korea with ease.",
        headline: "Help us build a better Konciar",
        surveyButton: "Take the survey",
        businessButton: "Business",
        fineprint: "Takes ~2 minutes. Your feedback helps us shape Konciar’s first release.",
        formUrl: "https://docs.google.com/forms/d/e/1FAIpQLSe_NO1ln-tbOybI6Z9JEdnpPXDtWxVZRYI40b432W8JAnBHHg/viewform",
        businessUrl: "/businessmodel.html"
      },
      cn: {
        subtitle: "帮助访客轻松探索韩国的 AI 智能管家。",
        headline: "帮助我们打造更好的 Konciar",
        surveyButton: "填写问卷",
        businessButton: "商业概览",
        fineprint: "大约 2 分钟完成。你的反馈将帮助我们改进 Konciar。",
        formUrl: "https://docs.google.com/forms/d/e/1FAIpQLScQWj27n1QpJhOu4qNAAaogJ2DI_M3HGLG2nXdQQi736eULZA/viewform",
        businessUrl: "/businessmodel.html"
      }
    };

    function setLang(lang, el) {
      document.getElementById("subtitle").innerText = content[lang].subtitle;
      document.getElementById("headline").innerText = content[lang].headline;

      const survey = document.getElementById("surveyLink");
      survey.innerText = content[lang].surveyButton;
      survey.href = content[lang].formUrl;

      const bm = document.getElementById("bmLink");
      bm.innerText = content[lang].businessButton;
      bm.href = content[lang].businessUrl;

      document.getElementById("fineprint").innerText = content[lang].fineprint;

      document.querySelectorAll(".lang-switch button").forEach(btn => {
        btn.classList.remove("active");
        btn.setAttribute("aria-pressed", "false");
      });

      el.classList.add("active");
      el.setAttribute("aria-pressed", "true");
    }
  </script>
</body>
</html>
