<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Konciar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    img {
      width: 220px;
      margin-bottom: 24px;
    }

    .lang-switch {
      margin-bottom: 16px;
      font-size: 14px;
    }

    .lang-switch button {
      background: none;
      border: none;
      cursor: pointer;
      margin: 0 6px;
      color: #666;
      font-size: 14px;
    }

    .lang-switch button.active {
      font-weight: 600;
      color: #000;
      text-decoration: underline;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      margin-bottom: 16px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.4;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 32px;
      font-weight: 500;
    }

    a.button {
      display: inline-block;
      padding: 14px 28px;
      background: #000000;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }

    a.button:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Konciar Logo" />

    <!-- 언어 선택 -->
    <div class="lang-switch">
      <button class="active" onclick="setLang('en', this)">EN</button>
      <button onclick="setLang('cn', this)">中文</button>
    </div>

    <p id="subtitle" class="subtitle">
      AI-powered concierge that helps visitors navigate Korea with ease.
    </p>

    <h1 id="headline">Help us build a better Konciar</h1>

    <a
      id="surveyLink"
      class="button"
      href="https://docs.google.com/forms/d/e/1FAIpQLSe_NO1ln-tbOybI6Z9JEdnpPXDtWxVZRYI40b432W8JAnBHHg/viewform"
      target="_blank"
    >
      Take the survey
    </a>
  </div>

  <script>
    const content = {
      en: {
        subtitle: "AI-powered concierge that helps visitors navigate Korea with ease.",
        headline: "Help us build a better Konciar",
        button: "Take the survey",
        formUrl: "https://docs.google.com/forms/d/e/1FAIpQLSe_NO1ln-tbOybI6Z9JEdnpPXDtWxVZRYI40b432W8JAnBHHg/viewform"
      },
      cn: {
        subtitle: "帮助访客轻松探索韩国的 AI 智能管家。",
        headline: "帮助我们打造更好的 Konciar",
        button: "填写问卷",
        formUrl: "https://docs.google.com/forms/d/e/1FAIpQLScQWj27n1QpJhOu4qNAAaogJ2DI_M3HGLG2nXdQQi736eULZA/viewform"
      }
    };

    function setLang(lang, el) {
      document.getElementById("subtitle").innerText = content[lang].subtitle;
      document.getElementById("headline").innerText = content[lang].headline;
      document.getElementById("surveyLink").innerText = content[lang].button;
      document.getElementById("surveyLink").href = content[lang].formUrl;

      document.querySelectorAll(".lang-switch button").forEach(btn => {
        btn.classList.remove("active");
      });
      el.classList.add("active");
    }
  </script>
</body>
</html>
